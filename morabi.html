        // مبدل‌های تاریخ میلادی به شمسی و بالعکس کاملا آفلاین و مستقل
        const JalaliDateHelper = {
            gregorianToJalali: (gy, gm, gd) => {
                const g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 335];
                let jy, jm, jd;
                if (gy > 1600) { jy = 979; gy -= 1600; } else { jy = 0; gy -= 621; }
                const gy2 = (gm > 2) ? (gy + 1) : gy;
                let days = (365 * gy) + parseInt((gy2 + 3) / 4) - parseInt((gy2 + 99) / 100) + parseInt((gy2 + 399) / 400) - 80 + gd + g_d_m[gm - 1];
                jy += 33 * parseInt(days / 12053); days %= 12053;
                jy += 4 * parseInt(days / 1461); days %= 1461;
                if (days > 365) { jy += parseInt((days - 1) / 365); days = (days - 1) % 365; }
                jm = (days < 186) ? (1 + parseInt(days / 31)) : (7 + parseInt((days - 186) / 30));
                jd = 1 + ((days < 186) ? (days % 31) : ((days - 186) % 30));
                return `${jy}/${String(jm).padStart(2, '0')}/${String(jd).padStart(2, '0')}`;
            },
            jalaliToGregorian: (jy, jm, jd) => {
                let gy, gm, gd;
                if (jy > 979) { gy = 1600; jy -= 979; } else { gy = 621; }
                let days = (365 * jy) + parseInt(jy / 33) * 8 + parseInt((jy % 33 + 3) / 4) - 78 + jd + ((jm < 7) ? ((jm - 1) * 31) : (((jm - 7) * 30) + 186));
                gy += 4 * parseInt(days / 1461); days %= 1461;
                if (days > 365) { gy += parseInt((days - 1) / 365); days = (days - 1) % 365; }
                const g_d_m = [0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                if ((gy % 4 === 0 && gy % 100 !== 0) || gy % 400 === 0) g_d_m[2] = 29;
                let i;
                for (i = 0; i < 13; i++) { if (days <= g_d_m[i]) break; days -= g_d_m[i]; }
                gm = i; gd = days;
                return `${gy}-${String(gm).padStart(2, '0')}-${String(gd).padStart(2, '0')}`;
            },
            getTodayJalali: () => {
                const today = new Date();
                return JalaliDateHelper.gregorianToJalali(today.getFullYear(), today.getMonth() + 1, today.getDate());
            }
        };

        // سوپاپ اطمینان برای جلوگیری از سفید شدن صفحه ناشی از تداخل دیتای لوکال استوریج قدیمی
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error", error, errorInfo);
            }

            handleReset = () => {
                localStorage.clear();
                window.location.reload();
            };

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6" dir="rtl">

                                </p>
                                <div className="text-left bg-slate-50 p-4 rounded-2xl text-[10px] font-mono text-slate-600 max-h-32 overflow-y-auto break-all">
                                    {this.state.error && this.state.error.toString()}
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={this.handleReset} className="flex-1 bg-red-600 hover:bg-red-700 text-white font-black py-3 rounded-xl transition text-sm">
                                        پاک‌سازی کش و بازنشانی داده‌ها
                                    </button>
                                    <button onClick={() => window.location.reload()} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition text-sm">
                                        تلاش مجدد
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

            }, [exercises]);

            useEffect(() => {
                try { localStorage.setItem('coach_plans', JSON.stringify(workoutPlans)); } catch(e) { console.error(e); }
            }, [workoutPlans]);

            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            };

            const calculateEndDate = (start, weeks) => {
                if (!start) return '';
                const date = new Date(start);
                date.setDate(date.getDate() + (parseInt(weeks) * 7));
                return date.toLocaleDateString('fa-IR');
            };

            const handleAddAthlete = (e) => {
                e.preventDefault();
                if (!newAthlete.name.trim()) {
                    showToast('وارد کردن نام ورزشکار الزامی است.', 'error');
                    return;
                }
                const athlete = { 
                    ...newAthlete, 
                    id: Date.now(), 
                    programCount: 0 
                };
                setAthletes([...athletes, athlete]);
                setNewAthlete({ name: '', height: '', weight: '', goal: '' });
                showToast(`پرونده جدید برای "${athlete.name}" ایجاد شد.`);
            };

            const handleDeleteAthlete = (id, name) => {
                setAthletes(athletes.filter(a => a.id !== id));
                setWorkoutPlans(workoutPlans.filter(p => p.athleteId !== id));
                showToast(`ورزشکار "${name}" و تمامی برنامه‌های او حذف شدند.`, 'info');
            };

            const startNewPlan = () => {
                setCurrentPlan({
                    id: Date.now(),
                    athleteId: athletes[0]?.id || null,
                    title: '',
                    coachName: settings.coaches && settings.coaches[0] ? settings.coaches[0] : 'استاد علی علوی',
                    startDate: new Date().toISOString().split('T')[0],
                    jalaliStartDate: JalaliDateHelper.getTodayJalali(),
                    durationWeeks: 4,
                    days: [{ id: Date.now(), dayTitle: 'روز اول تمرینی', exercises: [] }]
                });
                setIsCreatingPlan(true);
                setActiveTab('plans');
            };

            const addNewDay = () => {
                setCurrentPlan({
                    ...currentPlan,
                    days: [
                        ...currentPlan.days, 
                        { id: Date.now(), dayTitle: `روز ${currentPlan.days.length + 1} تمرینی`, exercises: [] }
                    ]
                });
                showToast('روز تمرینی جدید افزوده شد.');
            };

            const removeDay = (dayId) => {
                setCurrentPlan({
                    ...currentPlan,
                    days: currentPlan.days.filter(d => d.id !== dayId)
                });
                showToast('روز تمرینی با موفقیت حذف شد.', 'info');
            };

            const addExerciseToDay = (exercise, dayIndex) => {
                const updatedDays = [...currentPlan.days];
                updatedDays[dayIndex].exercises.push({
                    id: Math.random(),
                    exerciseId: exercise.id,
                    name: exercise.name,
                    muscle: exercise.muscle,
                    equipment: exercise.equipment,
                    sets: '3',
                    reps: '12',
                    coachNote: '',
                    isSuperset: 'none' 
                });
                setCurrentPlan({ ...currentPlan, days: updatedDays });
                showToast(`حرکت "${exercise.name}" به "${updatedDays[dayIndex].dayTitle}" اضافه شد.`);
            };

            const handleSupersetChange = (dayIndex, exIndex, value) => {
                const updatedDays = [...currentPlan.days];
                updatedDays[dayIndex].exercises[exIndex].isSuperset = value;
                setCurrentPlan({ ...currentPlan, days: updatedDays });
                showToast('حالت و نحوه اجرای سوپرست تنظیم شد.');
            };

            const moveExercise = (dayIndex, exIndex, direction) => {
                const updatedDays = [...currentPlan.days];
                const exercisesList = updatedDays[dayIndex].exercises;
                const targetIndex = direction === 'up' ? exIndex - 1 : exIndex + 1;
                
                if (targetIndex < 0 || targetIndex >= exercisesList.length) return;

                const temp = exercisesList[exIndex];
                exercisesList[exIndex] = exercisesList[targetIndex];
                exercisesList[targetIndex] = temp;

                setCurrentPlan({ ...currentPlan, days: updatedDays });
            };

            const deleteExerciseFromDay = (dayIndex, exIndex) => {
                const updatedDays = [...currentPlan.days];
                updatedDays[dayIndex].exercises.splice(exIndex, 1);
                setCurrentPlan({ ...currentPlan, days: updatedDays });
                showToast('حرکت از روز تمرینی حذف شد.', 'info');
            };

            const savePlan = (e) => {
                e.preventDefault();
                if (!currentPlan.athleteId) {
                    showToast("لطفاً یک ورزشکار را برای دریافت برنامه انتخاب کنید.", "error");
                    return;
                }
                if (!currentPlan.title.trim()) {
                    showToast("لطفاً عنوان برنامه را وارد کنید (مثال: برنامه کات فاز دوم).", "error");
                    return;
                }
                
                const updatedAthletes = athletes.map(a => 
                    a.id === currentPlan.athleteId ? { ...a, programCount: a.programCount + 1 } : a
                );
                setAthletes(updatedAthletes);

                const existingIndex = workoutPlans.findIndex(p => p.id === currentPlan.id);
                if (existingIndex > -1) {
                    const updatedPlans = [...workoutPlans];
                    updatedPlans[existingIndex] = currentPlan;
                    setWorkoutPlans(updatedPlans);
                } else {
                    setWorkoutPlans([...workoutPlans, currentPlan]);
                }
                
                setIsCreatingPlan(false);
                showToast('برنامه ورزشی با موفقیت ذخیره شد و در لیست قرار گرفت.');
            };

            const handleJalaliDateChange = (val) => {
                if (!val) return;
                const regex = /^(\d{4})\/(\d{2})\/(\d{2})$/;
                const match = val.match(regex);
                if (match) {
                    const jy = parseInt(match[1]);
                    const jm = parseInt(match[2]);
                    const jd = parseInt(match[3]);
                    if (jy >= 1300 && jy <= 1500 && jm >= 1 && jm <= 12 && jd >= 1 && jd <= 31) {
                        const gDateStr = JalaliDateHelper.jalaliToGregorian(jy, jm, jd);
                        setCurrentPlan(prev => ({
                            ...prev,
                            jalaliStartDate: val,
                            startDate: gDateStr
                        }));
                        showToast('تاریخ شمسی با موفقیت همگام‌سازی شد.');
                    } else {
                        setCurrentPlan(prev => ({ ...prev, jalaliStartDate: val }));
                    }
                } else {
                    setCurrentPlan(prev => ({ ...prev, jalaliStartDate: val }));
                }
            };

            const handleGregorianDateChange = (val) => {
                if (!val) return;
                const parts = val.split('-');
                if (parts.length === 3) {
                    const jDateStr = JalaliDateHelper.gregorianToJalali(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
                    setCurrentPlan(prev => ({
                        ...prev,
                        startDate: val,
                        jalaliStartDate: jDateStr
                    }));
                }
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setSettings(prev => ({
                            ...prev,
                            logo: reader.result
                        }));
                        showToast('لوگوی اختصاصی باشگاه با موفقیت آپلود و ذخیره شد.');
                    };
                    reader.readAsDataURL(file);
                }
            };

            const clearLogo = () => {
                setSettings(prev => ({ ...prev, logo: '' }));
                showToast('لوگوی باشگاه بازنشانی شد.', 'info');
            };

            const filteredExercises = useMemo(() => {
                return exercises.filter(ex => {
                    const matchesSearch = ex.name && ex.name.toLowerCase().includes(exerciseSearchTerm.toLowerCase());
                    const matchesFilter = selectedMuscleFilter === 'همه' || ex.muscle === selectedMuscleFilter;
                    return matchesSearch && matchesFilter;
                });
            }, [exercises, exerciseSearchTerm, selectedMuscleFilter]);

            const exportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(
                    JSON.stringify({
                        settings,
                        athletes,
                        exercises,
                        workoutPlans
                    }, null, 2)
                );
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `Fitness_Coach_Backup_${JalaliDateHelper.getTodayJalali().replace(/\//g, '-')}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast('فایل پشتیبان کامل سیستم دانلود شد.');
            };

            const handleImportBackup = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const parsed = JSON.parse(event.target.result);
                            if (parsed.settings) setSettings(parsed.settings);
                            if (parsed.athletes) setAthletes(parsed.athletes);
                            if (parsed.exercises) setExercises(parsed.exercises);
                            if (parsed.workoutPlans) setWorkoutPlans(parsed.workoutPlans);
                            showToast('تمام اطلاعات سیستم با موفقیت بازیابی شد.');
                        } catch (err) {
                            showToast('خطا در خواندن فایل پشتیبان. فرمت نامعتبر است.', 'error');
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const exportAthletesToCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
                csvContent += "شناسه,نام ورزشکار,قد,وزن,هدف,تعداد برنامه ورزشی\n";
                
                athletes.forEach(a => {
                    csvContent += `${a.id},"${a.name}",${a.height || '-'},${a.weight || '-'},"${a.goal || '-'}",${a.programCount}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Athletes_List_${JalaliDateHelper.getTodayJalali().replace(/\//g, '-')}.csv`);
                document.body.appendChild(link);
                link.click();
                link.remove();
                showToast('لیست ورزشکاران به صورت اکسل (CSV) دانلود شد.');
            };

            const renewalAthletes = useMemo(() => {
                const list = [];
                const today = new Date();
                
                if (!Array.isArray(athletes) || !Array.isArray(workoutPlans)) return [];
                
                athletes.forEach(athlete => {
                    const athletePlans = workoutPlans.filter(p => p && p.athleteId === athlete.id);
                    if (athletePlans.length === 0) return;

                    const latestPlan = athletePlans.reduce((latest, current) => {
                        const currentD = current && current.startDate ? new Date(current.startDate) : new Date(0);
                        const latestD = latest && latest.startDate ? new Date(latest.startDate) : new Date(0);
                        return currentD > latestD ? current : latest;
                    }, athletePlans[0]);

                    if (!latestPlan) return;

                    const startDate = latestPlan.startDate ? new Date(latestPlan.startDate) : new Date();
                    const weeks = latestPlan.durationWeeks ? parseInt(latestPlan.durationWeeks) : 4;
                    const endDate = new Date(startDate.getTime() + (weeks * 7 * 24 * 60 * 60 * 1000));
                    
                    const diffTime = endDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                    if (diffDays <= 10) {
                        list.push({
                            athlete,
                            latestPlan,
                            endDate: endDate.toLocaleDateString('fa-IR'),
                            remainingDays: diffDays
                        });
                    }
                });

                return list;
            }, [athletes, workoutPlans]);

            // تبدیل مستقیم ساختار HTML پیش‌نمایش به PDF شیک با نام اختصاصی ورزشکار
            const generatePDF = (plan) => {
                const athlete = athletes.find(a => a.id === plan.athleteId);
                const athleteName = athlete ? athlete.name.replace(/\s+/g, '_') : 'ورزشکار';
                const element = document.getElementById('print-target-area');
                
                showToast('در حال آماده‌سازی و دانلود فایل PDF اختصاصی...', 'info');
                
                const opt = {
                    margin:       [10, 10, 10, 10], 
                    filename:     `برنامه_تمرینی_${athleteName}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { 
                        scale: 2, 
                        useCORS: true,
                    },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css'] }
                };
                
                html2pdf().set(opt).from(element).save().then(() => {
                    showToast('برنامه ورزشی به صورت PDF شیک با موفقیت دانلود شد! 🎉', 'success');
                }).catch(err => {
                    console.error('PDF generation error:', err);
                    showToast('خطایی در تولید مستقیم فایل رخ داد. دوباره تلاش کنید.', 'error');
                });
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
                    
                    {/* لایه اعلان‌ها (Toasts) */}
                    <div className="fixed bottom-4 left-4 z-[300] space-y-2 no-print">
                        {toasts.map(t => (
                            <div key={t.id} className={`p-4 rounded-xl shadow-xl border text-white font-bold text-sm flex items-center gap-2 transform transition-all translate-y-0 duration-300 ${
                                t.type === 'error' ? 'bg-red-500 border-red-600' :
                                t.type === 'info' ? 'bg-amber-500 border-amber-600' : 'bg-emerald-600 border-emerald-700'
                            }`}>
                                <span className="w-2 h-2 rounded-full bg-white animate-ping"></span>
                                {t.message}
                            </div>
                        ))}
                    </div>

                    {/* سایدبار ناوبری دسکتاپ */}
                    <aside className="fixed right-0 top-0 h-full w-64 bg-slate-900 text-slate-100 p-6 hidden md:block z-50 no-print">
                        <div className="flex items-center gap-3 mb-10 border-b border-slate-800 pb-5">
                            {settings.logo ? (
                                <img src={settings.logo} className="w-12 h-12 rounded-xl object-cover border border-slate-700" alt="لوگو" />
                            ) : (
                                <div className="p-2.5 bg-blue-600 rounded-xl shadow-lg shadow-blue-500/30 text-white font-black text-center text-xs">
                                    {settings.clubName ? settings.clubName[0] : '🏋️'}
                                </div>
                            )}
                            <div className="min-w-0">
                                <h1 className="text-sm font-black truncate">{settings.clubName}</h1>
                                <p className="text-[10px] text-slate-400 mt-0.5">پنل هوشمند مربیان</p>
                            </div>
                        </div>
                        
                        <nav className="space-y-1.5">
                            <NavItem active={activeTab === 'dashboard'} onClick={() => {setActiveTab('dashboard'); setIsCreatingPlan(false)}} icon={<Icons.Dashboard />} label="داشبورد آماری" />
                            <NavItem active={activeTab === 'athletes'} onClick={() => {setActiveTab('athletes'); setIsCreatingPlan(false)}} icon={<Icons.Users />} label="مدیریت ورزشکاران" />
                            <NavItem active={activeTab === 'plans'} onClick={() => setActiveTab('plans')} icon={<Icons.Clipboard />} label="طراحی برنامه ورزشی" />
                            <NavItem active={activeTab === 'renewals'} onClick={() => setActiveTab('renewals')} icon={<Icons.Alert />} label="سررسید برنامه‌ها" badge={renewalAthletes.length} />
                            <NavItem active={activeTab === 'bank'} onClick={() => setActiveTab('bank')} icon={<Icons.Dumbbell />} label="بانک تمرینات" />
                            <NavItem active={activeTab === 'backup'} onClick={() => setActiveTab('backup')} icon={<Icons.Backup />} label="پشتیبان‌گیری داده‌ها" />
                            <NavItem active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon={<Icons.Settings />} label="تنظیمات سیستم" />
                        </nav>

                        <div className="absolute bottom-6 right-6 left-6 p-4 bg-slate-800/50 rounded-2xl border border-slate-700/50">
                            <p className="text-[10px] text-slate-400 font-bold leading-normal">برای دانلود فایل PDF با کیفیت، از دکمه "دانلود مستقیم فایل PDF" استفاده کنید.</p>
                        </div>
                    </aside>

                    {/* بخش محتوای اصلی */}
                    <main className="flex-1 md:pr-64 p-4 md:p-8 max-w-7xl mx-auto w-full no-print">
                        
                        {/* 1. داشبورد */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-3xl border border-slate-200/80 shadow-sm gap-4">
                                    <div className="flex items-center gap-4">
                                        {settings.logo && <img src={settings.logo} className="w-16 h-16 rounded-2xl object-cover shadow border" alt="لوگو" />}
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-900 font-sans">سلام مربی خوش آمدید! 👋</h2>
                                            <p className="text-slate-500 text-xs mt-1">مدیریت ورزشکاران و طراحی برنامه تمرینی آسان‌تر از همیشه.</p>
                                        </div>
                                    </div>
                                    <span className="text-xs bg-blue-50 text-blue-700 px-4 py-2 rounded-xl font-bold border border-blue-100">{settings.clubName}</span>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <StatCard title="ورزشکاران فعال باشگاه" value={athletes.length} icon={<Icons.Users />} color="bg-blue-50 text-blue-600" />
                                    <StatCard title="کل برنامه‌های صادرشده" value={workoutPlans.length} icon={<Icons.Clipboard />} color="bg-emerald-50 text-emerald-600" />
                                    <StatCard title="بانک تمرینات" value={exercises.length} icon={<Icons.Dumbbell />} color="bg-violet-50 text-violet-600" />
                                    <StatCard title="برنامه‌های سررسید شده" value={renewalAthletes.length} icon={<Icons.Alert />} color="bg-amber-50 text-amber-600" />
                                </div>

                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                    <h2 className="text-lg font-black mb-4 flex items-center gap-2 text-slate-900">
                                        <span className="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                                        دسترسی‌های سریع مربی
                                    </h2>
                                    <div className="flex flex-wrap gap-4">
                                        <button onClick={startNewPlan} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3.5 rounded-2xl font-bold flex items-center gap-2 transition shadow-lg shadow-blue-500/10">
                                            <Icons.Plus /> نوشتن برنامه ورزشی جدید
                                        </button>
                                        <button onClick={() => setActiveTab('athletes')} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-3.5 rounded-2xl font-bold flex items-center gap-2 transition">
                                            <Icons.Users /> افزودن ورزشکار جدید
                                        </button>
                                        <button onClick={() => setActiveTab('renewals')} className="bg-amber-100 hover:bg-amber-200 text-amber-800 px-6 py-3.5 rounded-2xl font-bold flex items-center gap-2 transition">
                                            <Icons.Alert /> وضعیت تمدیدها
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. مدیریت ورزشکاران */}
                        {activeTab === 'athletes' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl border border-slate-200/80 shadow-sm">
                                    <h3 className="text-lg font-black mb-4 flex items-center gap-2 text-slate-950">
                                        <Icons.Users /> ثبت ورزشکار جدید در پرونده الکترونیک
                                    </h3>
                                    <form onSubmit={handleAddAthlete} className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                        <input required className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white font-bold" placeholder="نام و نام خانوادگی ورزشکار *" value={newAthlete.name} onChange={e => setNewAthlete({...newAthlete, name: e.target.value})} />
                                        <input className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white font-bold" placeholder="قد (سانتی‌متر)" value={newAthlete.height} onChange={e => setNewAthlete({...newAthlete, height: e.target.value})} />
                                        <input className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white font-bold" placeholder="وزن (کیلوگرم)" value={newAthlete.weight} onChange={e => setNewAthlete({...newAthlete, weight: e.target.value})} />
                                        <input className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm md:col-span-1 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white font-bold" placeholder="هدف ورزشی (کات، حجم و...)" value={newAthlete.goal} onChange={e => setNewAthlete({...newAthlete, goal: e.target.value})} />
                                        <button type="submit" className="bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2 py-3">
                                            <Icons.Plus /> ایجاد پرونده
                                        </button>
                                    </form>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {athletes.map(a => (
                                        <div key={a.id} className="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm hover:shadow-md transition relative flex flex-col justify-between">
                                            <div>
                                                <div className="flex justify-between items-start">
                                                    <h4 className="font-bold text-lg text-slate-900">{a.name}</h4>
                                                    <button onClick={() => handleDeleteAthlete(a.id, a.name)} className="text-slate-300 hover:text-red-500 transition-colors p-1" title="حذف پرونده">
                                                        <Icons.Trash />
                                                    </button>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3 mt-4 text-xs text-slate-500 border-t pt-3 border-slate-100 font-bold">
                                                    <div>📏 قد: <span className="font-black text-slate-800">{a.height || '-'} سانتی‌متر</span></div>
                                                    <div>⚖️ وزن: <span className="font-black text-slate-800">{a.weight || '-'} کیلوگرم</span></div>
                                                </div>
                                            </div>
                                            <div className="mt-5 space-y-3">
                                                <div className="p-3 bg-slate-50 rounded-xl text-xs">
                                                    <span className="text-slate-400 block mb-1">هدف اختصاصی:</span>
                                                    <span className="font-bold text-slate-800 block truncate">{a.goal || 'توضیحات ثبت نشده'}</span>
                                                </div>
                                                <div className="flex justify-between items-center text-xs text-slate-500 bg-blue-50/40 p-2.5 rounded-xl border border-blue-100/30">
                                                    <span>تعداد برنامه‌های صادرشده:</span>
                                                    <span className="font-black text-blue-700 text-sm">{a.programCount} فاز</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 3. لیست برنامه‌ها یا سازنده برنامه */}

                        </div>
                        <div className="text-center shrink-0">
                            <div className="w-24 h-10 border border-dashed border-slate-300 rounded-lg flex items-center justify-center mb-0.5 bg-slate-50/50">
                                <span className="text-[8px] font-black text-slate-400 rotate-12">مهر و امضاء مربی</span>
                            </div>
                            <p className="text-[10px] font-black text-slate-900 leading-none mt-1">{plan.coachName}</p>
                        </div>
                    </div>
                </div>
            );
        };

        /* کامپوننت دکمه‌های ناوبری جانبی مربی */
        const NavItem = ({ active, onClick, icon, label, badge }) => (
            <button onClick={onClick} className={`w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-200 ${active ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'text-slate-400 hover:text-white hover:bg-slate-800/60'}`}>
                <div className="flex items-center gap-3.5">
                    {icon} <span className="text-sm font-bold">{label}</span>
                </div>
                {badge > 0 ? (
                    <span className="bg-amber-500 text-slate-900 text-[10px] font-black px-2 py-0.5 rounded-full font-sans">
                        {badge}
                    </span>
                ) : null}
            </button>
        );

        /* کامپوننت کارت‌های گزارش وضعیت داشبورد */
        const StatCard = ({ title, value, icon, color }) => (
            <div className="bg-white p-6 rounded-3xl border border-slate-200/80 flex justify-between items-center shadow-sm">
                <div>
                    <p className="text-slate-400 text-xs font-bold mb-1.5">{title}</p>
                    <p className="text-3xl font-black text-slate-900">{value}</p>
                </div>
                <div className={`p-4 rounded-2xl ${color}`}>{icon}</div>
            </div>
        );

        // اجرای رندر اپلیکیشن به صورت ایمن همراه با ErrorBoundary در ریشه
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
